[github]
owner = "georgeci007"
repo = "Murloc-Manager"
base_branch = "main"

[labels]
ready = "agent:ready"
running = "agent:running"
review = "agent:review"
failed = "agent:failed"
blocked = "agent:blocked"

[executor]
kind = "claude_cli"
command = "claude"
extra_args = ["--print", "--permission-mode=acceptEdits"]
timeout_sec = 600

[retry]
max_attempts = 3

[checks]
commands = [
    ["ruff", "check", "."],
    ["pytest", "-q"],
]

[paths]
worktrees_root = ".murloc/worktrees"
repo_root = "."
