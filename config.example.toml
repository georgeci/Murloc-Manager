# Which GitHub repo Murloc watches.
[github]
owner = "georgeci"
repo = "Murloc-Manager"
base_branch = "main"

# Projects v2 integration — drives Murloc state via board Status field.
# Required fields: number (the N from /users/<owner>/projects/<N>).
# When this block is present, Murloc reads the ready queue and flips statuses
# via GraphQL; the project-status-mirror workflow is not needed.
# Expected Status option names: "Todo", "In Progress", "In Review", "Failed".
[github.project]
owner_type   = "user"    # only "user" supported
# owner      = "alice"   # optional: project owner login if different from github.owner
number       = 1         # /users/<owner>/projects/<N>
status_field = "Status"  # name of the single-select field on the board

# Local checkout of that same repo. Murloc creates worktrees from here and
# pushes from here. Use an absolute path if you run `murloc` from elsewhere.
#   repo_root = "/Users/me/Developer/my-android-app"
[paths]
repo_root = "."
worktrees_root = ".murloc/worktrees"

# Labels are now for classification only (type:bug, area:auth, priority:high).
# They are no longer used as workflow state when [github.project] is configured.
[labels]
ready = "agent:ready"
running = "agent:running"
review = "agent:review"
failed = "agent:failed"
blocked = "agent:blocked"

[executor]
kind = "claude_cli"
command = "claude"
extra_args = ["--print", "--permission-mode=acceptEdits"]
timeout_sec = 1800

[runtime]
# dry_run: when true, Murloc does NOT write to GitHub — no label swaps,
# no failure/review comments. Use for local debugging.
dry_run = false
# smoke_prompt: when true, send a trivial "read pyproject.toml" prompt
# instead of the real issue prompt. Verifies the executor works end-to-end
# without asking the agent to actually code.
smoke_prompt = false
